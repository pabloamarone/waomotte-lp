<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">和を以て OGP</title>
  <desc id="desc">調和して、共に解を導く。</desc>
  <rect width="1200" height="630" fill="#fffdf8"/>
  <rect x="56" y="56" width="1088" height="518" rx="18" fill="#f7f1e6" stroke="#b99a57" stroke-width="2"/>
  <circle cx="930" cy="210" r="170" fill="#dcc58b" opacity="0.34"/>
  <circle cx="930" cy="210" r="112" fill="none" stroke="#102744" stroke-opacity="0.14" stroke-width="2"/>
  <circle cx="930" cy="210" r="64" fill="none" stroke="#102744" stroke-opacity="0.14" stroke-width="2"/>
  <text x="120" y="210" fill="#102744" font-family="serif" font-size="82" font-weight="700">和を以て</text>
  <text x="120" y="318" fill="#102744" font-family="serif" font-size="52" font-weight="700">調和して、共に解を導く。</text>
  <text x="120" y="405" fill="#1f2528" font-family="sans-serif" font-size="30">人と技術の総和で、成し遂げる。</text>
  <line x1="120" y1="460" x2="450" y2="460" stroke="#b99a57" stroke-width="4"/>
</svg>
